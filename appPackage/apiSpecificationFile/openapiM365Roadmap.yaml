openapi: 3.0.0
info:
  title: Microsoft 365 Roadmap API
  description: Retrieve roadmap item details using a search term.
  version: 1.0.0
servers:
  - url: https://www.microsoft.com/en-us/microsoft-365
paths:
  /roadmap:
    get:
      summary: Get roadmap item by search term
      description: Returns roadmap details for a specific search term.
      operationId: getRoadmapItem
      parameters:
        - name: searchterms
          in: query
          description: ad hoc search terms for roadmap items
          required: false
          schema:
            type: string
          example: "481558"
        - name: filters
          in: query
          description: Comma-separated filters for rollout state and product (e.g., "In development,Outlook")
          required: false
          schema:
            type: string
          example: "In development,Outlook,Microsoft Copilot,GCC,New within: last-week"
      responses:
        '200':
          description: Successful response
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid request
        '404':
          description: Item not found
