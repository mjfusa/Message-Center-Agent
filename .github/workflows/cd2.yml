name: Deploy Agent 2

on:
  #push:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TEAMSAPP_CLI_VERSION: "1.0.0"
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: install cli
        run: |
          npm install @microsoft/m365agentstoolkit-cli@${{env.TEAMSAPP_CLI_VERSION}}
      
      - name: Deploy to Teams
        run: npx atk deploy --env prod --ignore-env-file true
        env:
          TEAMS_APP_ID: ${{ secrets.TEAMS_APP_ID }}
          M365_CLIENT_ID: ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET: ${{ secrets.M365_CLIENT_SECRET }}
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          TEAMSFX_ENV: prod
