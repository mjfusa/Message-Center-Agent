name: Deploy Agent 2

on:
  #push:
  #  branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TEAMSAPP_CLI_VERSION: "1.0.0"
    steps:
      - uses: actions/checkout@v3
      - name: Set release type variable
        id: set_release_type
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TYPE=prod" >> $GITHUB_ENV
          else
            echo "RELEASE_TYPE=dev" >> $GITHUB_ENV
          fi
      - name: Show release type
        run: echo "Release type is $RELEASE_TYPE"      
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: install cli
        run: |
          npm install @microsoft/m365agentstoolkit-cli@${{env.TEAMSAPP_CLI_VERSION}}

      - name: Parse configuration secrets
        run: |
          CONFIG_BLOCK="${{ secrets.COPILOT_AGENT_ENV }}"
          while IFS= read -r line; do
            if [[ ! -z "$line" ]]; then
              key=$(echo "$line" | cut -d'=' -f1)
              value=$(echo "$line" | cut -d'=' -f2-)
              echo "$key=$value" >> $GITHUB_ENV
              echo "Setting $key from config block"
            fi
          done <<< "$CONFIG_BLOCK"          
      
      - name: Deploy to Teams
#        run: npx atk deploy --ignore-env-file true --interactive false
        #run: npx atk deploy --env prod --ignore-env-file true --interactive false
        env:
          M365_CLIENT_ID: ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET: ${{ secrets.M365_CLIENT_SECRET }}
          M365_TENANT_ID: ${{ env.TEAMS_APP_TENANT_ID}}
        if: ${{ env.RELEASE_TYPE == 'dev' }}
        run: npx atk deploy --env dev --ignore-env-file true --interactive false
        # if the release type is prod, use atk publish
      - name: Publish to Teams
        if: ${{ env.RELEASE_TYPE == 'prod' }}
        run: npx atk publish --env prod --ignore-env-file true --interactive false
